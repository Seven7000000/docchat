<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocChat AI - Chat with your PDFs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: { cyan: '#06ffa5', purple: '#9d4edd', blue: '#1e90ff' },
                        dark: { 900: '#0a0a0f', 800: '#12121a', 700: '#1a1a2e', 600: '#252540' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glow { box-shadow: 0 0 20px rgba(6, 255, 165, 0.15); }
        .glow-purple { box-shadow: 0 0 20px rgba(157, 78, 221, 0.15); }
        .chat-msg { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 5px rgba(6,255,165,0.3); } 50% { box-shadow: 0 0 20px rgba(6,255,165,0.6); } }
        .uploading { animation: pulse-glow 1.5s infinite; }
        .markdown-content h1, .markdown-content h2, .markdown-content h3 { font-weight: 600; margin: 0.5em 0; }
        .markdown-content ul, .markdown-content ol { padding-left: 1.5em; margin: 0.5em 0; }
        .markdown-content li { margin: 0.25em 0; }
        .markdown-content code { background: rgba(6,255,165,0.1); padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.9em; }
        .markdown-content p { margin: 0.4em 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #12121a; }
        ::-webkit-scrollbar-thumb { background: #9d4edd; border-radius: 3px; }
    </style>
</head>
<body class="bg-dark-900 text-gray-200 min-h-screen">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold mb-2">
                <span class="text-neon-cyan">Doc</span><span class="text-neon-purple">Chat</span>
                <span class="text-gray-400 text-2xl font-light ml-1">AI</span>
            </h1>
            <p class="text-gray-500">Upload a PDF and chat with your document</p>
        </div>

        <!-- Upload Section -->
        <div id="upload-section" class="mb-6">
            <div id="drop-zone"
                 class="border-2 border-dashed border-dark-600 rounded-xl p-12 text-center cursor-pointer hover:border-neon-cyan transition-all duration-300"
                 ondrop="handleDrop(event)" ondragover="event.preventDefault()" onclick="document.getElementById('file-input').click()">
                <div id="upload-icon" class="text-5xl mb-4">📄</div>
                <p class="text-gray-400 mb-2">Drag & drop a PDF here or click to browse</p>
                <p class="text-gray-600 text-sm">Supports PDF files up to 10MB</p>
                <input type="file" id="file-input" accept=".pdf" class="hidden" onchange="uploadFile(this.files[0])">
            </div>
            <div id="upload-status" class="mt-3 text-center hidden">
                <div class="inline-flex items-center gap-2 bg-dark-700 px-4 py-2 rounded-lg">
                    <div class="w-4 h-4 border-2 border-neon-cyan border-t-transparent rounded-full animate-spin"></div>
                    <span class="text-gray-400" id="upload-text">Uploading...</span>
                </div>
            </div>
        </div>

        <!-- Doc Info Bar -->
        <div id="doc-info" class="hidden mb-4 bg-dark-800 rounded-lg p-3 flex items-center justify-between border border-dark-600">
            <div class="flex items-center gap-3">
                <span class="text-neon-cyan text-xl">✓</span>
                <div>
                    <p class="text-sm font-medium text-gray-300" id="doc-name"></p>
                    <p class="text-xs text-gray-500" id="doc-meta"></p>
                </div>
            </div>
            <button onclick="resetDoc()" class="text-gray-500 hover:text-red-400 text-sm transition">Remove</button>
        </div>

        <!-- Chat Section -->
        <div id="chat-section" class="hidden">
            <div id="chat-messages" class="bg-dark-800 rounded-xl border border-dark-600 p-4 h-[450px] overflow-y-auto mb-4 space-y-4">
                <div class="chat-msg flex gap-3">
                    <div class="w-8 h-8 rounded-lg bg-neon-purple/20 flex items-center justify-center text-sm shrink-0">AI</div>
                    <div class="bg-dark-700 rounded-lg p-3 text-sm text-gray-300 max-w-[85%]">
                        Document loaded! Ask me anything about it.
                    </div>
                </div>
            </div>
            <div class="flex gap-3">
                <input type="text" id="chat-input"
                       placeholder="Ask a question about your document..."
                       class="flex-1 bg-dark-800 border border-dark-600 rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-neon-cyan transition"
                       onkeydown="if(event.key==='Enter' && !event.shiftKey) sendMessage()">
                <button onclick="sendMessage()"
                        class="bg-neon-cyan/10 border border-neon-cyan/30 text-neon-cyan px-6 rounded-xl hover:bg-neon-cyan/20 transition font-medium text-sm">
                    Send
                </button>
            </div>
        </div>
    </div>

    <script>
        let docId = null;
        let history = [];

        function handleDrop(e) {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file) uploadFile(file);
        }

        async function uploadFile(file) {
            if (!file || !file.name.toLowerCase().endsWith('.pdf')) {
                showError('Please select a PDF file');
                return;
            }
            const statusEl = document.getElementById('upload-status');
            const dropZone = document.getElementById('drop-zone');
            statusEl.classList.remove('hidden');
            dropZone.classList.add('uploading', 'border-neon-cyan');
            document.getElementById('upload-text').textContent = 'Processing PDF...';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Upload failed');
                }
                const data = await res.json();
                docId = data.doc_id;
                history = [];

                document.getElementById('doc-name').textContent = data.filename;
                document.getElementById('doc-meta').textContent = `${data.pages} pages · ${Math.round(data.chars/1000)}k characters`;
                document.getElementById('doc-info').classList.remove('hidden');
                document.getElementById('upload-section').classList.add('hidden');
                document.getElementById('chat-section').classList.remove('hidden');
                document.getElementById('chat-input').focus();
            } catch (err) {
                showError(err.message);
            } finally {
                statusEl.classList.add('hidden');
                dropZone.classList.remove('uploading', 'border-neon-cyan');
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const question = input.value.trim();
            if (!question || !docId) return;
            input.value = '';

            appendMessage('user', question);

            const loadingId = appendMessage('ai', '<div class="flex items-center gap-2"><div class="w-3 h-3 border-2 border-neon-purple border-t-transparent rounded-full animate-spin"></div><span class="text-gray-500">Thinking...</span></div>');

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ doc_id: docId, question, history })
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Chat failed');
                }
                const data = await res.json();
                history.push({ role: 'user', content: question });
                history.push({ role: 'assistant', content: data.answer });
                removeMessage(loadingId);
                appendMessage('ai', formatMarkdown(data.answer));
            } catch (err) {
                removeMessage(loadingId);
                appendMessage('ai', `<span class="text-red-400">Error: ${err.message}</span>`);
            }
        }

        function appendMessage(role, html) {
            const container = document.getElementById('chat-messages');
            const id = 'msg-' + Date.now() + Math.random();
            const isUser = role === 'user';
            const div = document.createElement('div');
            div.id = id;
            div.className = 'chat-msg flex gap-3' + (isUser ? ' flex-row-reverse' : '');
            div.innerHTML = `
                <div class="w-8 h-8 rounded-lg ${isUser ? 'bg-neon-blue/20 text-neon-blue' : 'bg-neon-purple/20 text-neon-purple'} flex items-center justify-center text-xs shrink-0 font-medium">
                    ${isUser ? 'You' : 'AI'}
                </div>
                <div class="${isUser ? 'bg-dark-600' : 'bg-dark-700'} rounded-lg p-3 text-sm text-gray-300 max-w-[85%] markdown-content">
                    ${isUser ? escapeHtml(html) : html}
                </div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return id;
        }

        function removeMessage(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function resetDoc() {
            docId = null;
            history = [];
            document.getElementById('doc-info').classList.add('hidden');
            document.getElementById('chat-section').classList.add('hidden');
            document.getElementById('upload-section').classList.remove('hidden');
            document.getElementById('chat-messages').innerHTML = `
                <div class="chat-msg flex gap-3">
                    <div class="w-8 h-8 rounded-lg bg-neon-purple/20 flex items-center justify-center text-sm shrink-0">AI</div>
                    <div class="bg-dark-700 rounded-lg p-3 text-sm text-gray-300">Document loaded! Ask me anything about it.</div>
                </div>`;
            document.getElementById('file-input').value = '';
        }

        function showError(msg) {
            alert(msg);
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatMarkdown(text) {
            return text
                .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre class="bg-dark-900 p-3 rounded-lg my-2 overflow-x-auto text-xs"><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*(.+?)\*\*/g, '<strong class="text-gray-100">$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/^### (.+)$/gm, '<h3 class="text-neon-cyan text-base">$1</h3>')
                .replace(/^## (.+)$/gm, '<h2 class="text-neon-cyan text-lg">$1</h2>')
                .replace(/^# (.+)$/gm, '<h1 class="text-neon-cyan text-xl">$1</h1>')
                .replace(/^- (.+)$/gm, '<li class="ml-4">$1</li>')
                .replace(/^(\d+)\. (.+)$/gm, '<li class="ml-4 list-decimal">$2</li>')
                .replace(/\n\n/g, '<br><br>')
                .replace(/\n/g, '<br>');
        }
    </script>
</body>
</html>
